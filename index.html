<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONEYGAME - 一鍵開啟</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #ccc;
            background-color: #f0f0f0;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #e0e0e0;
        }
        /* 特別將"全部開啟"按鈕樣式弄得顯眼一點 */
        .open-all-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            font-weight: bold;
            padding: 15px 30px;
            display: block; /* 讓它單獨一行 */
            margin: 20px auto; /* 置中 */
        }
        .open-all-btn:hover {
            background-color: #45a049;
        }
    </style>
    <script>
        function openAllLinks() {
            // 定義所有要開啟的網址
            const urls = [
                'https://dev.gppay.asia/#/signin/fd36c515-0a31-43aa-88e5-c065aa2d232a',
                'https://merchant.cgpay.io',
                'https://me.wegosm666.com/#/login?redirect=%2Fdashboard',
                'https://pay.drmpro.net/',
                'https://mer.llspayment.com/mer/',
                'https://b2b.twwalletb2bmanagerab.com'
            ];

            // 遍歷網址並開啟
            urls.forEach(url => {
                window.open(url, '_blank');
            });
        }
    </script>
</head>
<body>
    <h1>選擇要開啟的連接</h1>
    
    <button class="open-all-btn" onclick="openAllLinks()">🚀 一鍵開啟全部網頁</button>
    
    <hr style="width: 50%; margin: 20px auto;">

    <button onclick="window.open('https://dev.gppay.asia/#/signin/fd36c515-0a31-43aa-88e5-c065aa2d232a')">GO</button>
    <button onclick="window.open('https://merchant.cgpay.io')">CG</button>
    <button onclick="window.open('https://me.wegosm666.com/#/login?redirect=%2Fdashboard')">GOSM</button>
    <button onclick="window.open('https://pay.drmpro.net/')">DMP</button>
    <button onclick="window.open('https://mer.llspayment.com/mer/')">HAPPY</button>
    <button onclick="window.open('https://b2b.twwalletb2bmanagerab.com')">EB</button>
    <button onclick="window.open('https://time.is/zh/')">TIME.IS</button>
</body>
</html>
